<!-- @dsCard group="Brand" name="Logo" subtitle="Klaster pikseli — jeden piksel ucieka z siatki" viewport="700x200" -->
<!doctype html>
<html lang="pl"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;display:grid;grid-template-columns:1fr 1fr;width:700px}
  .pane{padding:26px;display:flex;flex-direction:column;gap:18px;justify-content:center}
  .m{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--sp-tx-3)}
</style></head>
<body>
  <div class="pane" style="background:var(--sp-paper)">
    <img src="../assets/logo-smartpixel-lockup.svg" width="232" alt="Smart Pixel">
    <div style="display:flex;align-items:center;gap:14px">
      <img src="../assets/logo-smartpixel-mark.svg" width="40" alt="">
      <span class="m">Mark · min. 24px</span>
    </div>
  </div>
  <div class="pane" style="background:var(--sp-ink)">
    <img src="../assets/logo-smartpixel-lockup-white.svg" width="232" alt="Smart Pixel">
    <div style="display:flex;align-items:center;gap:14px">
      <img src="../assets/logo-smartpixel-mark-white.svg" width="40" alt="">
      <span class="m" style="color:var(--sp-txd-3)">Na ink i na fotografii</span>
    </div>
  </div>
</body></html>
