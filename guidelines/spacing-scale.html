<!-- @dsCard group="Spacing" name="Skala odstępów" subtitle="Baza 4px · 4–160" viewport="700x180" -->
<!doctype html>
<html lang="pl"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{background:var(--sp-paper);margin:0;padding:20px 24px;box-sizing:border-box;width:700px}
  .r{display:flex;align-items:center;gap:14px;margin-bottom:7px}
  .m{font-family:var(--font-mono);font-size:10px;letter-spacing:.05em;color:var(--sp-tx-3);width:84px;flex:none}
  .bar{height:12px;background:var(--sp-ink)}
  .red{background:var(--sp-red)}
</style></head>
<body>
  <div class="r"><span class="m">--sp-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="m">--sp-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="m">--sp-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="m">--sp-10 · 40</span><div class="bar" style="width:40px"></div></div>
  <div class="r"><span class="m">--sp-18 · 72</span><div class="bar red" style="width:72px"></div></div>
  <div class="r"><span class="m">--sp-24 · 96</span><div class="bar red" style="width:96px"></div></div>
  <div class="r" style="margin-bottom:0"><span class="m">--sp-40 · 160</span><div class="bar red" style="width:160px"></div></div>
</body></html>
