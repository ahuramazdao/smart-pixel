<!-- @dsCard group="Components" name="Core" subtitle="Button · ArrowLink · Eyebrow · Tag · Stat" viewport="700x430" -->
<!doctype html>
<html lang="pl"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{background:var(--sp-paper);margin:0;padding:20px 24px;box-sizing:border-box;width:700px}
  .m{font-family:var(--font-mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--sp-tx-3);margin:0 0 10px}
  section{margin-bottom:20px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script>window.exports={};window.module={exports:window.exports};window.require=function(){return window.exports;};</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react" src="Button.jsx"></script>
<script type="text/babel" data-presets="env,react" src="ArrowLink.jsx"></script>
<script type="text/babel" data-presets="env,react" src="Eyebrow.jsx"></script>
<script type="text/babel" data-presets="env,react" src="Tag.jsx"></script>
<script type="text/babel" data-presets="env,react" src="Stat.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { Button, ArrowLink, Eyebrow, Tag, Stat } = window.exports;
function App() {
  return (
    <div>
      <section>
        <p className="m">Button · primary / dark / outline / ghost / disabled / sm / lg+arrow</p>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <Button variant="primary">Umów rozmowę</Button>
          <Button variant="dark">Wyceń projekt</Button>
          <Button variant="outline">Zobacz projekty</Button>
          <Button variant="ghost">Później</Button>
          <Button variant="primary" disabled>Wysłano</Button>
          <Button variant="dark" size="sm">Mały</Button>
          <Button variant="primary" size="lg" arrow>Start</Button>
        </div>
      </section>
      <section>
        <p className="m">ArrowLink · Eyebrow</p>
        <div style={{display:'flex',gap:28,alignItems:'center',flexWrap:'wrap',marginBottom:12}}>
          <ArrowLink>Zobacz case study</ArrowLink>
          <ArrowLink external>smartpixel.pl</ArrowLink>
        </div>
        <Eyebrow note="(2023—2026)">Wybrane projekty</Eyebrow>
      </section>
      <section>
        <p className="m">Tag · default / active</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <Tag>Strony www</Tag>
          <Tag active>Aplikacje webowe</Tag>
          <Tag>Automatyzacje</Tag>
          <Tag>E-commerce</Tag>
        </div>
      </section>
      <section style={{marginBottom:0}}>
        <p className="m">Stat</p>
        <div style={{display:'flex',gap:40}}>
          <Stat size="sm" value="120" unit="+" label="Wdrożeń" />
          <Stat size="sm" value="98" unit="%" label="Klientów wraca" />
          <Stat size="sm" value="6" unit="tyg" label="Mediana startu" />
        </div>
      </section>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
